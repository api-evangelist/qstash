apis:
  - aid: qstash:qstash-api
    name: QStash API
    description: >-
      The QStash REST API provides HTTP-based endpoints for publishing messages
      to destination URLs, managing queues, scheduling tasks with CRON
      expressions, configuring URL groups for fan-out delivery, retrieving
      message logs, and managing dead-letter queues. Authentication uses Bearer
      tokens obtained from the Upstash console.
